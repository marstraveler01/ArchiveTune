name: Cloud Compile (Do Not Melt)

on:
  push:
    branches: [ dev-might-explode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission
      run: chmod +x gradlew

    - name: Cloud Compile (Suicide Mission)
      env:
        GRADLE_OPTS: "-Xmx3584m -XX:MaxMetaspaceSize=512m -XX:+UseSerialGC"
      run: |
        ./gradlew :app:assembleFossMobileArm64Debug \
          --no-daemon \
          --max-workers=3 \
          --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: ArchiveTune-CloudDebug
        path: app/build/outputs/apk/**/*.apk
